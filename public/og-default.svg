  <text x="600" y="315" text-anchor="middle" fill="#1F1F1C" font-family="Fraunces, Georgia, serif" font-size="108" font-weight="900">afourblog</text>
  <text x="600" y="430" text-anchor="middle" fill="#7A7A72" font-family="Newsreader, Georgia, serif" font-size="34">技术、读书、生活与随笔。</text>
